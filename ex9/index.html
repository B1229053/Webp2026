<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>Lab9 - Flickr 照片牆實作</title>
    <style>
        /* 照片牆容器設定 [cite: 1236-1244] */
        .gallery {
            --g: 6px; /* 間隔大小 */
            display: grid;
            width: 800px; /* 整體寬度，可依需求調整 */
            aspect-ratio: 1; /* 保持正方形比例 */
            grid: auto-flow 1fr / repeat(3, 1fr); /* 核心：定義三欄網格 */
            gap: var(--g);
            margin: 20px auto;
        }

        /* 圖片基本樣式 [cite: 1245-1255] */
        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保圖片裁切不變形 */
            filter: grayscale(); /* 預設黑白 */
            cursor: pointer;
            transition: .5s;
        }

        .gallery img:hover {
            filter: grayscale(0); /* 滑鼠移入變彩色 */
        }

        /* 老師要求的特殊拼貼裁切效果 [cite: 1256-1269] */
        .gallery img:nth-child(2) {
            grid-area: 1/2/span 2/span 2;
            clip-path: polygon(0 0, 100% 0, 100% 100%, calc(50% + var(--g)/4) 100%, 0 calc(50% + var(--g)/4));
        }

        .gallery img:nth-child(3) {
            grid-area: 2/1/span 2/span 2;
            clip-path: polygon(0 0, calc(50% - var(--g)/4) 0, 100% calc(50% + var(--g)/4), 100% 100%, 0 100%);
        }
    </style>
</head>
<body>
    <div style="text-align: center; padding: 20px;">
        <h1>Flickr API 照片牆 (Lab9)</h1>
        <button onclick="getFlickrImg()">取得 Flickr 照片</button>
    </div>
    
    <div id="gallery" class="gallery"></div>

    <script src="script.js"></script>
</body>
</html>
